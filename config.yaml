# General Settings
litellm_settings:
  drop_params: true
  set_verbose: false
  
# Optional: Router settings for load balancing
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  
# Optional: Success/Failure callbacks
