  - model_name: grok-4
    litellm_params:
      model: vercel_ai_gateway/xai/grok-4
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY

# General Settings
litellm_settings:
  drop_params: true
  set_verbose: false
  
# Optional: Router settings for load balancing
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  
# Optional: Success/Failure callbacks
# success_callback: ["langfuse"]
# failure_callback: ["langfuse"]
