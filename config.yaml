litellm_settings:
  drop_params: true
  set_verbose: false
  fallbacks:
    - {"moonshotai/kimi-k2-thinking": ["grok-4"]}
    - {"grok-4": ["gpt-5"]}
    - {"gpt-5": ["glm-4.5-flash"]}

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 60
  
