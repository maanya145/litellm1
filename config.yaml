      rpm: 60
    model_info:
      supports_function_calling: true

  #routehub
  - model_name: minimaxai/minimax-m2
    litellm_params:
      model: openai/minimax-m2:free
      api_base: https://api.routeway.ai/v1/
      api_key: os.environ/ROUTEWAY_API_KEY
      rpm: 20
    model_info:
      supports_function_calling: true
      
    #nvidia nim
  - model_name: minimaxai/minimax-m2
    litellm_params:
      model: nvidia_nim/minimaxai/minimax-m2  # add nvidia_nim/ prefix to route as Nvidia NIM provider
      api_key: os.environ/NIM_API_KEY
      rpm: 40
    
  # vercel ai gateway
  - model_name: moonshotai/kimi-k2-thinking
    litellm_params:
      model: vercel_ai_gateway/moonshotai/kimi-k2-thinking
